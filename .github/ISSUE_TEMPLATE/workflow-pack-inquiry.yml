name: Template pack or customization inquiry
description: Public-safe inquiry for the broader n8n + Claude workflow template pack or customization needs.
title: "[inquiry]: "
labels: ["inquiry", "template-pack"]
body:
  - type: markdown
    attributes:
      value: |
        This public issue is only for sanitized, non-sensitive scoping. Do not include API keys, private repository URLs, customer names/data, procurement details, KYC/tax/bank/payout information, production logs, or internal screenshots. If a paid engagement is approved later, sensitive implementation details should move to an approved private channel.
  - type: dropdown
    id: interest
    attributes:
      label: What are you interested in?
      options:
        - Full template pack
        - Customizing the Free Lite workflow
        - Claude narrative summary workflow
        - PR review or release digest workflow
        - Slack/Notion/Discord delivery workflow
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: public-safe-use-case
    attributes:
      label: Public-safe use case
      description: Describe the use case without private data or internal system details.
      placeholder: "We want a weekly public repo digest that a maintainer reviews before posting."
    validations:
      required: true
  - type: dropdown
    id: data-sensitivity
    attributes:
      label: What data would the workflow use in the first test?
      options:
        - Public GitHub data only
        - Sanitized sample data only
        - Private data later, but not shared in this issue
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: success-criteria
    attributes:
      label: Public-safe success criteria
      description: Describe observable outcomes without promising or requesting guaranteed ROI.
      placeholder: "Import succeeds; produces a draft markdown digest; human approval happens before posting."
    validations:
      required: false
  - type: checkboxes
    id: boundary-confirmation
    attributes:
      label: Boundary confirmation
      options:
        - label: I understand this public issue cannot include secrets, private data, legal/procurement details, or payment/KYC/tax/bank information.
          required: true
        - label: I understand any custom work must be separately scoped and does not include guaranteed ROI claims.
          required: true
