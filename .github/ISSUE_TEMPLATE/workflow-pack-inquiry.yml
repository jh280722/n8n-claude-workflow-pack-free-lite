name: Workflow pack / customization inquiry
description: Ask about the paid workflow template pack or a small customization using sanitized context only.
title: "[Workflow pack inquiry]: "
labels: ["inquiry", "workflow-pack"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for checking out Free Lite.

        **Public safety rule:** do not paste secrets, API keys, private repo URLs, customer data, internal incident details, or proprietary workflow exports into this public issue. Keep examples sanitized.
  - type: dropdown
    id: interest
    attributes:
      label: What are you interested in?
      options:
        - Starter template pack
        - Pro template pack
        - Small customization of Free Lite
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: current-workflow
    attributes:
      label: Current workflow pain point
      description: Describe the workflow at a high level. Use public/sanitized examples only.
      placeholder: "Example: We manually summarize public GitHub release activity every Friday and paste it into Slack."
    validations:
      required: true
  - type: dropdown
    id: tools
    attributes:
      label: Tools involved
      multiple: true
      options:
        - n8n
        - GitHub
        - Slack
        - Notion
        - Linear/Jira
        - Claude/Anthropic API
        - Other
    validations:
      required: true
  - type: textarea
    id: desired-output
    attributes:
      label: Desired output
      description: What should the workflow produce?
      placeholder: "Example: Markdown weekly summary, PR risk digest, Notion task list, Slack-ready draft."
    validations:
      required: true
  - type: dropdown
    id: credential-boundary
    attributes:
      label: Credential/data boundary
      description: Confirm what you can share publicly in this issue.
      options:
        - Public repos/data only
        - Sanitized examples only
        - Private data exists but will not be posted here
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or must-haves
      placeholder: "Example: draft-only output, no auto-posting, English/Korean output, Friday schedule."
    validations:
      required: false
