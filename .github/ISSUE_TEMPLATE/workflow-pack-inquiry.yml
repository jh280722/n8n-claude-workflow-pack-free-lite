name: Template pack or customization inquiry
description: Public-safe inquiry for the broader template pack or a scoped customization discussion.
title: "[Inquiry]: "
labels: ["inquiry", "template-pack"]
body:
  - type: markdown
    attributes:
      value: |
        This is only for sanitized, public pre-qualification. Do not include tokens, private workspace data, credentials, private repository names, customer data, procurement/legal/KYC/tax details, payout/bank information, contracts, or confidential workflow exports. Sensitive scoping, if approved later, should move to an approved private channel.
  - type: dropdown
    id: interest
    attributes:
      label: What are you interested in?
      options:
        - "Full n8n + Claude workflow template pack"
        - "Customization of the Free Lite workflow"
        - "Slack/Notion/Discord delivery pattern"
        - "Private-repo adaptation guidance"
        - "Not sure yet"
    validations:
      required: true
  - type: dropdown
    id: data-boundary
    attributes:
      label: What data boundary should the workflow respect?
      options:
        - "Public GitHub data only"
        - "Sanitized exports only"
        - "Private repo/workspace data would be needed later, not shared here"
        - "Unknown"
    validations:
      required: true
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: "Describe the outcome without private names, credentials, logs, or guaranteed ROI claims."
      placeholder: "A weekly markdown summary reviewed by a human before posting to Slack."
    validations:
      required: true
  - type: input
    id: timeline
    attributes:
      label: Timing, if relevant
      description: "Optional. Use broad timing only, not procurement/legal details."
      placeholder: "This month / exploring / later"
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Public-safety confirmation
      options:
        - label: "I did not include secrets, private repo URLs, customer data, credentials, procurement/legal/KYC/tax/bank details, production logs, or confidential workflow exports."
          required: true
