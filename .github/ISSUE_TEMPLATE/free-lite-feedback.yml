name: Free Lite feedback or integration request
description: Share public-safe feedback about the Free Lite workflow or request a next integration direction.
title: "[feedback]: "
labels: ["free-lite", "feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep this issue public-safe. Do not include secrets, private repo names, customer data, internal logs, or screenshots from private systems.
  - type: dropdown
    id: result
    attributes:
      label: What happened when you tried the workflow?
      options:
        - Imported and ran successfully
        - Imported but did not run successfully
        - Did not import successfully
        - I have not tried it yet
    validations:
      required: true
  - type: textarea
    id: useful-part
    attributes:
      label: What was useful?
      description: Describe the output or setup step that helped. Keep examples sanitized.
      placeholder: "The markdown summary helped me review merged PRs before a weekly update."
    validations:
      required: false
  - type: dropdown
    id: next-integration
    attributes:
      label: Which integration would be most useful next?
      options:
        - Claude narrative summary
        - Slack delivery
        - Discord delivery
        - Notion page/database output
        - GitHub issue/PR digest
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: sanitized-context
    attributes:
      label: Sanitized context
      description: Share only public-safe context about your use case. Avoid company/client names unless they are public and safe to mention.
      placeholder: "Small open-source maintainer team; weekly release note draft; public repo only."
    validations:
      required: false
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Public-safety confirmation
      options:
        - label: I removed secrets, private repository details, customer data, production logs, and internal screenshots from this issue.
          required: true
