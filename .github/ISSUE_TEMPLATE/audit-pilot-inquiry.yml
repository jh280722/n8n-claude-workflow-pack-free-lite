name: Workflow audit / pilot inquiry
description: Ask about a fixed-scope AI workflow audit or narrow implementation pilot using sanitized context only.
title: "[Audit/pilot inquiry]: "
labels: ["inquiry", "audit-pilot"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for a public, sanitized first pass only.

        **Do not post:** API keys, tokens, private repo links, customer data, internal security incidents, workplace confidential data, legal/procurement details, bank/Stripe/tax/KYC details, or production credentials.
  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - AI workflow audit beta
        - 2-week implementation pilot
        - Audit first, then decide
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: team-context
    attributes:
      label: Team/context snapshot
      description: Keep this high-level and sanitized.
      placeholder: "Example: 8-person product team; GitHub + Slack + Notion; weekly release notes and PR follow-up are manual."
    validations:
      required: true
  - type: textarea
    id: manual-process
    attributes:
      label: Manual process to audit
      placeholder: "Example: Review merged PRs, identify risky changes, write a weekly ops brief, and create follow-up tasks."
    validations:
      required: true
  - type: dropdown
    id: automation-risk
    attributes:
      label: Preferred automation risk level
      options:
        - Draft-only recommendations; no writes to tools
        - Human-approved posting to Slack/Notion
        - Human-approved GitHub comments/issues
        - Need help choosing a safe boundary
    validations:
      required: true
  - type: textarea
    id: success-metric
    attributes:
      label: Success metric
      placeholder: "Example: save 2 hours/week, reduce missed follow-ups, standardize weekly stakeholder update."
    validations:
      required: true
  - type: textarea
    id: blockers
    attributes:
      label: Known blockers or requirements
      placeholder: "Example: must self-host n8n; cannot share private data publicly; security review required before credentials."
    validations:
      required: false
