name: Workflow audit or pilot inquiry
description: Public-safe inquiry for a fixed-scope workflow audit or pilot discussion.
title: "[Audit/Pilot]: "
labels: ["inquiry", "audit-pilot"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for sanitized public context. Do not post workplace/private data, credentials, tokens, private repository URLs, customer data, production logs, legal/KYC/tax/bank/payout information, contracts, or promises/requirements for guaranteed ROI.
  - type: dropdown
    id: audit-area
    attributes:
      label: Which area needs audit or pilot help?
      options:
        - "GitHub activity summary workflow"
        - "PR review or release-readiness workflow"
        - "Slack/Notion/Discord handoff workflow"
        - "Meeting/action item extraction workflow"
        - "AI workflow backlog or ROI snapshot"
        - "Other public-safe workflow area"
    validations:
      required: true
  - type: dropdown
    id: current-stage
    attributes:
      label: Current stage
      options:
        - "Idea / requirements only"
        - "Existing n8n workflow needs review"
        - "Imported Free Lite and want next-step guidance"
        - "Pilot scope exploration"
    validations:
      required: true
  - type: textarea
    id: public-safe-scope
    attributes:
      label: Public-safe scope summary
      description: "Describe the process at a high level only. Redact private systems, customers, incidents, logs, and credentials."
      placeholder: "We want a human-reviewed weekly summary from public or sanitized GitHub activity."
    validations:
      required: true
  - type: dropdown
    id: constraints
    attributes:
      label: Important constraints
      options:
        - "Read-only / draft-only output"
        - "Human approval before posting"
        - "No private data in public discussion"
        - "Need security/permissions review later"
        - "Not sure yet"
    validations:
      required: true
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Public-safety confirmation
      options:
        - label: "I removed secrets, private URLs, customer data, production logs, credentials, legal/KYC/tax/bank details, and guaranteed ROI claims from this issue."
          required: true
