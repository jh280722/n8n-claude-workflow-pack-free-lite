name: Workflow audit or pilot inquiry
description: Public-safe inquiry for a fixed-scope AI workflow audit or small pilot.
title: "[audit/pilot]: "
labels: ["inquiry", "audit-pilot"]
body:
  - type: markdown
    attributes:
      value: |
        Use this only for public-safe scoping. Do not include workplace secrets, customer data, private repo names/URLs, internal logs, production credentials, procurement/legal/KYC/tax/bank/payout details, or private screenshots.
  - type: dropdown
    id: request-type
    attributes:
      label: What are you considering?
      options:
        - AI workflow audit
        - Small read-only automation pilot
        - n8n workflow review
        - Workflow safety/red-team review
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: first-data-source
    attributes:
      label: Safe first test data source
      options:
        - Public GitHub repo
        - Sanitized CSV/Markdown sample
        - Sanitized workflow export
        - Private data later, not shared here
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: problem-summary
    attributes:
      label: Public-safe problem summary
      description: Keep it generic and sanitized. Avoid names of private systems, clients, incidents, or secrets.
      placeholder: "We spend too much time turning public repo activity into weekly status drafts."
    validations:
      required: true
  - type: textarea
    id: desired-output
    attributes:
      label: Desired reviewed output
      description: The recommended starting point is draft-only output with human review before any posting or write action.
      placeholder: "A markdown digest that a human reviews before Slack/Notion posting."
    validations:
      required: false
  - type: checkboxes
    id: safety-boundary
    attributes:
      label: Safety boundary
      options:
        - label: I removed secrets, private repo names/URLs, customer data, production logs, and internal screenshots from this issue.
          required: true
        - label: I understand the first public-safe discussion should stay read-only/draft-only and avoid guaranteed ROI claims.
          required: true
