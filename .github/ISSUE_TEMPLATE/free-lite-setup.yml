name: Free Lite setup question
description: Public-safe setup help for importing or running the Free Lite n8n workflow.
title: "[setup]: "
labels: ["free-lite", "setup"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing the Free Lite workflow. Please keep this issue public-safe: do not paste API keys, tokens, private repository URLs, customer data, production logs, or proprietary workflow exports.
  - type: input
    id: n8n-version
    attributes:
      label: n8n version
      description: "Example: 1.96.0. If unknown, write 'unknown'."
      placeholder: "1.x.x"
    validations:
      required: true
  - type: dropdown
    id: import-status
    attributes:
      label: Did the workflow import successfully?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
  - type: input
    id: public-test-repo
    attributes:
      label: Public test repo used
      description: "Use owner/repo for a public repo only. If you tested a private repo, write 'private repo tested; name redacted'."
      placeholder: "n8n-io/n8n"
    validations:
      required: true
  - type: input
    id: failing-node
    attributes:
      label: Failing node name
      description: "If no node failed, write 'none'."
      placeholder: "Fetch GitHub Activity and Build Markdown"
    validations:
      required: true
  - type: textarea
    id: redacted-error
    attributes:
      label: Redacted error text
      description: Paste only sanitized error text. Remove tokens, URLs for private repos, internal hostnames, and customer data.
      placeholder: "GitHub commits failed: 403 ..."
    validations:
      required: false
  - type: dropdown
    id: markdown-output
    attributes:
      label: Did the final markdown field appear?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Public-safety confirmation
      options:
        - label: I removed secrets, private repo names/URLs, customer data, production logs, and internal screenshots from this issue.
          required: true
