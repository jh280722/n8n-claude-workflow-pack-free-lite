name: Free Lite setup question
description: Ask a public-safe setup or import question about the Free Lite workflow.
title: "[Setup]: "
labels: ["free-lite", "setup"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying the Free Lite workflow. Keep this issue public-safe: do not post API keys, private repository URLs, customer data, production logs, internal screenshots, credentials, paid account details, tax/KYC details, or exploit details for a real private system.
  - type: input
    id: n8n-version
    attributes:
      label: n8n version
      description: "Example: 1.90.0. If unknown, write unknown."
      placeholder: "1.x.x"
    validations:
      required: true
  - type: dropdown
    id: import-status
    attributes:
      label: Did the workflow import successfully?
      options:
        - "Yes"
        - "No"
        - "Not tried yet"
    validations:
      required: true
  - type: input
    id: failed-node
    attributes:
      label: Node that failed, if any
      description: "Use the node name only. Do not paste credentials or private URLs."
      placeholder: "Fetch GitHub Activity and Build Markdown"
  - type: dropdown
    id: data-safety
    attributes:
      label: What kind of test data did you use?
      options:
        - "Public repository"
        - "Sanitized sample data"
        - "Private repository, but not naming it publicly"
        - "Not applicable"
    validations:
      required: true
  - type: textarea
    id: sanitized-error
    attributes:
      label: Sanitized error or symptom
      description: "Redact tokens, private repo names, hostnames, customer names, request IDs, and production logs before posting."
      placeholder: "The final node did not return a markdown field. Redacted error: ..."
    validations:
      required: true
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Public-safety confirmation
      options:
        - label: "I removed tokens, private repo URLs, customer data, production logs, credentials, and paid account/KYC/tax details from this issue."
          required: true
