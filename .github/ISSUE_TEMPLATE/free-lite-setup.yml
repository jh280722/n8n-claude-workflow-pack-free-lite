name: Free Lite setup question
description: Ask a public-safe setup or import question about the Free Lite workflow.
title: "[Setup]: "
labels: ["free-lite", "setup"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying the Free Lite workflow. Keep this issue public-safe: do not post API keys, private repository URLs, customer data, production logs, internal screenshots, credentials, paid account details, tax/KYC details, or exploit details for a real private system.

        If you cloned the repo first, run `python3 scripts/validate_free_lite.py` and `git diff --check`, then copy the clone-run public receipt from `docs/clone-to-first-success.md`. The fields below mirror that receipt so a maintainer can help without asking for secrets, checkout/payment details, payout/wallet/bank/Stripe details, tax/KYC/contract details, DM/email/forms, private outreach, paid ads, or guaranteed ROI assumptions.
  - type: input
    id: n8n-version
    attributes:
      label: n8n version
      description: "Example: 1.90.0. If unknown, write unknown."
      placeholder: "1.x.x"
    validations:
      required: true
  - type: dropdown
    id: import-status
    attributes:
      label: Did the workflow import successfully?
      options:
        - "Yes"
        - "No"
        - "Not tried yet"
    validations:
      required: true
  - type: input
    id: failed-node
    attributes:
      label: Node that failed, if any
      description: "Use the node name only. Do not paste credentials or private URLs."
      placeholder: "Fetch GitHub Activity and Build Markdown"
  - type: dropdown
    id: data-safety
    attributes:
      label: What kind of test data did you use?
      options:
        - "Public repository"
        - "Sanitized sample data"
        - "Private repository, but not naming it publicly"
        - "Not applicable"
    validations:
      required: true
  - type: dropdown
    id: local-validation
    attributes:
      label: Local validation before posting
      description: "If you cloned the repo, run both checks from the repository root. If you used only the release ZIP, choose Not applicable."
      options:
        - "python3 scripts/validate_free_lite.py passed and git diff --check passed"
        - "One or both checks failed; sanitized details below"
        - "Not run yet"
        - "Not applicable; release ZIP only"
    validations:
      required: true
  - type: input
    id: public-test-repository
    attributes:
      label: Public test repository or redacted data boundary
      description: "Use owner/repo only for a public repository. If you used private data locally, write private repo tested; name redacted."
      placeholder: "n8n-io/n8n or private repo tested; name redacted"
    validations:
      required: true
  - type: dropdown
    id: final-markdown-field
    attributes:
      label: Did the final markdown field appear?
      options:
        - "Yes"
        - "No"
        - "Not sure"
        - "Did not reach final node"
    validations:
      required: true
  - type: dropdown
    id: sample-output-comparison
    attributes:
      label: Sample-output comparison
      description: "Compare only the structure against samples/sample-output.md; do not paste private output."
      options:
        - "Matches expected structure"
        - "Partially matches"
        - "Does not match"
        - "Not compared yet"
    validations:
      required: true
  - type: dropdown
    id: next-safe-route
    attributes:
      label: Next safe route requested
      options:
        - "Setup/import help"
        - "Output feedback"
        - "Template-pack fit"
        - "Audit/pilot fit"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: sanitized-error
    attributes:
      label: Sanitized error or symptom
      description: "Redact tokens, private repo names, hostnames, customer names, request IDs, and production logs before posting."
      placeholder: "The final node did not return a markdown field. Redacted error: ..."
    validations:
      required: true
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Public-safety confirmation
      options:
        - label: "I removed tokens, private repo URLs, customer data, production logs, credentials, checkout/payment details, payout/wallet/bank/Stripe details, tax/KYC/contract details, DM/email/forms/private outreach requests, paid ads instructions, and guaranteed ROI claims from this issue."
          required: true
